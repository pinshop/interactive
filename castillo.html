<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Castillo 1V1</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: linear-gradient(120deg, #1a1a2e, #16213e);
      color: white;
      font-family: 'Segoe UI', Arial, sans-serif;
      text-align: center;
      overflow-x: hidden;
      position: relative;
      height: 100%;
      min-height: 100vh;
    }

    #particles {
      position: fixed;
      top: 0;
      left: 0;
      z-index: -1;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
      position: relative;
      animation: fadeZoom 1.5s ease-in-out;
    }

    @keyframes fadeZoom {
      0% { opacity: 0; transform: scale(0.9); }
      100% { opacity: 1; transform: scale(1); }
    }

    h1 {
      font-size: 2.5em;
      color: #FFD700;
      margin-bottom: 10px;
      transition: transform 0.3s ease;
    }

    .description {
      color: #d4d4d4;
      font-size: 1.2em;
      margin-bottom: 20px;
    }

    .parallax-container {
      perspective: 1000px;
      margin-bottom: 25px;
    }

    .parallax-item {
      display: inline-block;
      transform-style: preserve-3d;
      transition: transform 0.1s ease-out;
    }

    /* VIDEO HORIZONTAL 16:9 */
    video {
      width: 100%;
      max-width: 700px;
      height: auto;
      aspect-ratio: 16 / 9;
      border: 2px solid #FFD700;
      border-radius: 12px;
      background: black;
      object-fit: cover;
    }

    .btn-whatsapp {
      display: inline-block;
      margin-top: 15px;
      background: linear-gradient(90deg, #4CAF50, #2196F3);
      color: white;
      padding: 12px 25px;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
      font-size: 1.1em;
      box-shadow: 0 5px 15px rgba(0,0,0,0.4);
      transition: all 0.3s ease;
    }

    .btn-whatsapp:hover {
      transform: scale(1.05);
    }

    .btn-back {
      display: inline-block;
      margin-top: 15px;
      margin-left: 10px;
      background: rgba(255, 255, 255, 0.1);
      color: white;
      padding: 12px 25px;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
      font-size: 1.1em;
      transition: all 0.3s ease;
      border: 1px solid rgba(255,255,255,0.3);
    }

    .btn-back:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    @media (max-width: 768px) {
      h1 { font-size: 2em; }
      .description { font-size: 1em; }
    }
  </style>
</head>
<body>

  <canvas id="particles"></canvas>

  <div class="container">
    <h1 id="title">CASTILLO 1V1</h1>
    <p class="description">
      Competencia de MVPs y Tap Taps en este juego interactivo para TikTok.
    </p>

    <!-- VIDEO HORIZONTAL -->
    <div class="parallax-container">
      <div class="parallax-item" id="parallax-item">
        <video autoplay muted loop playsinline>
          <source src="castillo.mp4" type="video/mp4">
        </video>
      </div>
    </div>

    <!-- Botón compra -->
    <div>
        <a href="https://wa.me/573105051410?text=¡Hola!%20Quiero%20el%20juego%20Castillo%201v1" 
           target="_blank" class="btn-whatsapp">📲 ¡Quiero este juego!</a>
        <a href="index.html" class="btn-back">⬅ Volver</a>
    </div>
  </div>

  <script>
    const parallaxItem = document.getElementById('parallax-item');
    const title = document.getElementById('title');

    document.addEventListener('mousemove', (e) => {
      let x = (window.innerWidth / 2 - e.pageX) / 40;
      let y = (window.innerHeight / 2 - e.pageY) / 40;
      parallaxItem.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
      title.style.transform = `translateX(${x}px) translateY(${y}px)`;
    });

    document.addEventListener('mouseleave', () => {
      parallaxItem.style.transform = `rotateY(0deg) rotateX(0deg)`;
      title.style.transform = `translateX(0px) translateY(0px)`;
    });

    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    let particlesArray = [];
    let mouse = { x: null, y: null };

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });

    window.addEventListener('mousemove', (e) => {
      mouse.x = e.x;
      mouse.y = e.y;
    });

    class Particle {
      constructor(x, y, size, color) {
        this.x = x;
        this.y = y;
        this.size = size;
        this.color = color;
        this.speedX = (Math.random() - 0.5) * 1.5;
        this.speedY = (Math.random() - 0.5) * 1.5;
      }
      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.shadowColor = '#87CEEB'; // Azul cielo
        ctx.shadowBlur = 15;
        ctx.fill();
      }
      update() {
        this.x += this.speedX;
        this.y += this.speedY;
        const dx = mouse.x - this.x;
        const dy = mouse.y - this.y;
        const distance = Math.sqrt(dx * dx + dy * dy);
        if (distance < 100) {
          this.x -= dx / 10;
          this.y -= dy / 10;
        }
        if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
        if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
        this.draw();
      }
    }

    function initParticles() {
      particlesArray = [];
      const numberOfParticles = (canvas.width * canvas.height) / 9000;
      for (let i = 0; i < numberOfParticles; i++) {
        const size = Math.random() * 3 + 1;
        const x = Math.random() * canvas.width;
        const y = Math.random() * canvas.height;
        // Azul claro para las particulas
        particlesArray.push(new Particle(x, y, size, 'rgba(135,206,235,0.8)'));
      }
    }

    function animateParticles() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particlesArray.forEach(p => p.update());
      requestAnimationFrame(animateParticles);
    }

    initParticles();
    animateParticles();
  </script>

</body>
</html>
